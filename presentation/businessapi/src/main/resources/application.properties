quarkus.application.name=businessapi
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/openapi

# Log level
quarkus.log.level=WARN
quarkus.log.category."com.arify".level=WARN

quarkus.smallrye-health.root-path=/health
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=arify.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE

# Application info
quarkus.application.version=1.0.0

# Redis Cache Configuration (Development Mode)
# En producción, estas variables deben configurarse como variables de entorno:
# - REDIS_HOST
# - REDIS_PASSWORD
# - REDIS_DATABASE
# - REDIS_ABORT_ON_CONNECT_FAIL
# - REDIS_SSL (opcional)
RedisDatabase.Host=localhost
RedisDatabase.Passwd=your-redis-password
RedisDatabase.Database=0
RedisDatabase.AbortOnConnectFail=false
RedisDatabase.Ssl=false
